<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Builder Pro — Aprende a armar tu PC</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════ RESET & VARIABLES ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#f5f6f8;--bg-card:#ffffff;--bg-card2:#f0f2f5;--bg-surface:#e8ebef;
  --accent:#2563eb;--accent2:#3b82f6;--accent-glow:rgba(37,99,235,0.12);
  --cyan:#0891b2;--green:#16a34a;--red:#dc2626;--amber:#d97706;--pink:#db2777;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --radius:10px;--radius-sm:8px;--radius-lg:14px;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg-deep);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);outline:none}
img{max-width:100%;display:block;border-radius:var(--radius-sm)}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* ═══════════ UTILITY ═══════════ */
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.flex-center{display:flex;align-items:center;justify-content:center}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}.mt-32{margin-top:32px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.text-center{text-align:center}
.hidden{display:none!important}

/* ═══════════ ANIMATIONS ═══════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}50%{box-shadow:0 0 24px 8px var(--accent-glow)}}
@keyframes slideRight{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes glow{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.anim-fade{animation:fadeUp 0.6s ease both}
.anim-fade-d1{animation:fadeUp 0.6s ease 0.1s both}
.anim-fade-d2{animation:fadeUp 0.6s ease 0.2s both}
.anim-fade-d3{animation:fadeUp 0.6s ease 0.3s both}

/* ═══════════ BADGES & PILLS ═══════════ */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.3px}
.badge-purple{background:rgba(108,92,231,0.15);color:#a78bfa}
.badge-cyan{background:rgba(34,211,238,0.12);color:var(--cyan)}
.badge-green{background:rgba(52,211,153,0.12);color:var(--green)}
.badge-red{background:rgba(248,113,113,0.12);color:var(--red)}
.badge-amber{background:rgba(251,191,36,0.12);color:var(--amber)}
.badge-pink{background:rgba(244,114,182,0.12);color:var(--pink)}

/* ═══════════ BUTTONS ═══════════ */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;transition:all 0.3s;letter-spacing:0.2px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--accent-glow)}
.btn-secondary{background:var(--bg-surface);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--accent);background:rgba(108,92,231,0.08)}
.btn-danger{background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.btn-danger:hover{background:rgba(248,113,113,0.2)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px}
.btn-icon{width:40px;height:40px;padding:0;border-radius:10px;justify-content:center;background:var(--bg-surface);color:var(--text2);border:1px solid var(--border)}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}

/* ═══════════ CARDS ═══════════ */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:all 0.35s}
.card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:var(--shadow)}
.card-img{width:100%;height:180px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:16px;background:var(--bg-surface)}
.card-compact{padding:16px}

/* ═══════════ FORM CONTROLS ═══════════ */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:0.3px;text-transform:uppercase}
.form-input,.form-select,.form-textarea{width:100%;padding:12px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-deep);color:var(--text);font-size:14px;transition:border 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px}
.form-error{border-color:var(--red)!important}
.error-text{font-size:12px;color:var(--red);margin-top:4px}

/* ═══════════ PROGRESS BAR ═══════════ */
.progress-bar{height:8px;background:var(--bg-surface);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 0.5s ease;background:linear-gradient(90deg,var(--accent),var(--cyan))}

/* ═══════════ HEADER / NAV ═══════════ */
.header{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-0.5px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px}
.nav{display:flex;gap:2px;align-items:center}
.nav-btn{padding:8px 14px;border-radius:8px;background:transparent;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.2s;border:none;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-btn.active{color:var(--accent);background:rgba(108,92,231,0.1);font-weight:600}
.user-info{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.mobile-toggle{display:none;width:40px;height:40px;border-radius:8px;background:var(--bg-surface);align-items:center;justify-content:center;border:1px solid var(--border);color:var(--text)}

/* ═══════════ SECTION HEADERS ═══════════ */
.section-header{margin-bottom:28px}
.section-title{font-size:28px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.section-subtitle{font-size:15px;color:var(--text2);margin-top:6px;max-width:600px}
.category-title{font-size:20px;font-weight:700;color:var(--text);margin:32px 0 16px;display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.category-title:first-of-type{margin-top:0}

/* ═══════════ MODAL ═══════════ */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fadeIn 0.2s ease}
.modal{background:var(--bg-card);border:1px solid var(--border2);border-radius:var(--radius-lg);max-width:640px;width:100%;max-height:88vh;overflow-y:auto;padding:32px;animation:fadeUp 0.3s ease}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-title{font-size:22px;font-weight:700}
.modal-close{width:36px;height:36px;border-radius:50%;background:var(--bg-surface);color:var(--text2);display:flex;align-items:center;justify-content:center;border:none;font-size:18px;transition:all 0.2s}
.modal-close:hover{background:var(--red);color:#fff}

/* ═══════════ COMPONENT DETAIL ═══════════ */
.detail-img{width:100%;height:240px;object-fit:cover;border-radius:var(--radius);margin-bottom:20px;background:var(--bg-surface)}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.spec-item{padding:10px 14px;background:var(--bg-deep);border-radius:var(--radius-sm);border:1px solid var(--border)}
.spec-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.spec-value{font-size:14px;font-weight:600;color:var(--text);margin-top:2px}
.compat-box{padding:14px 16px;border-radius:var(--radius-sm);margin:12px 0;border-left:3px solid}
.compat-warn{background:rgba(251,191,36,0.08);border-color:var(--amber)}
.compat-ok{background:rgba(52,211,153,0.08);border-color:var(--green)}
.compat-err{background:rgba(248,113,113,0.08);border-color:var(--red)}
.compat-info{background:rgba(34,211,238,0.08);border-color:var(--cyan)}

/* ═══════════ VIDEO LINK ═══════════ */
.video-link{display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:var(--radius-sm);background:var(--red);color:#fff;font-weight:600;font-size:14px;transition:all 0.3s;text-decoration:none}
.video-link:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(220,38,38,0.3)}

/* ═══════════ ASSEMBLY STEP ═══════════ */
.step-card{display:flex;gap:16px;align-items:flex-start;padding:20px;border-radius:var(--radius);background:var(--bg-card);border:1px solid var(--border);transition:all 0.3s;cursor:pointer}
.step-card:hover{border-color:var(--border2)}
.step-card.active{border-color:var(--accent);background:var(--bg-card2)}
.step-card.completed{border-color:var(--green);opacity:0.8}
.step-num{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;border:2px solid var(--border);color:var(--text2);transition:all 0.3s}
.step-card.active .step-num{border-color:var(--accent);background:var(--accent);color:#fff}
.step-card.completed .step-num{border-color:var(--green);background:var(--green);color:#fff}

/* ═══════════ QUIZ ═══════════ */
.quiz-option{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--bg-deep);cursor:pointer;transition:all 0.25s;font-size:15px}
.quiz-option:hover{border-color:var(--accent);background:rgba(108,92,231,0.05)}
.quiz-option.correct{border-color:var(--green)!important;background:rgba(52,211,153,0.08)!important}
.quiz-option.wrong{border-color:var(--red)!important;background:rgba(248,113,113,0.08)!important}
.quiz-option.disabled{pointer-events:none}
.quiz-letter{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:var(--bg-surface);color:var(--text2);flex-shrink:0;transition:all 0.25s}
.quiz-option.correct .quiz-letter{background:var(--green);color:#fff}
.quiz-option.wrong .quiz-letter{background:var(--red);color:#fff}

/* ═══════════ STORE CARD ═══════════ */
.store-verified{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green);font-weight:600}
.store-stars{display:inline-flex;gap:2px;color:var(--amber);font-size:14px}

/* ═══════════ LOGIN ═══════════ */
.login-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg-deep);position:relative;overflow:hidden}
.login-bg{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none}
.login-bg::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,0.06),transparent);top:-200px;right:-100px}
.login-bg::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(8,145,178,0.05),transparent);bottom:-100px;left:-50px}
.login-card{max-width:440px;width:100%;position:relative;z-index:1}
.login-tabs{display:flex;gap:0;background:var(--bg-deep);border-radius:var(--radius-sm);padding:3px;margin-bottom:28px;border:1px solid var(--border)}
.login-tab{flex:1;padding:10px;border:none;border-radius:8px;font-weight:600;font-size:14px;transition:all 0.2s;background:transparent;color:var(--text3)}
.login-tab.active{background:var(--bg-surface);color:var(--text)}

/* ═══════════ HERO ═══════════ */
.hero{padding:56px 0 40px;text-align:center;position:relative}
.hero-title{font-size:clamp(32px,5vw,48px);font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:16px}
.hero-title span{background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-desc{font-size:17px;color:var(--text2);max-width:560px;margin:0 auto 36px}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.hero-card{padding:20px 24px;border-radius:var(--radius);background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all 0.3s;text-align:left;min-width:150px}
.hero-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 12px 32px rgba(108,92,231,0.15)}
.hero-card-icon{font-size:28px;margin-bottom:8px}
.hero-card-label{font-weight:600;font-size:14px}
.hero-card-desc{font-size:12px;color:var(--text3);margin-top:2px}

/* ═══════════ SEARCH BAR ═══════════ */
.search-bar{position:relative;margin-bottom:20px}
.search-bar input{width:100%;padding:14px 16px 14px 44px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:15px}
.search-bar input:focus{border-color:var(--accent)}
.search-bar::before{content:'';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px}

/* ═══════════ FILTER TABS ═══════════ */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.filter-tab{padding:8px 16px;border-radius:20px;background:var(--bg-surface);color:var(--text2);border:1px solid var(--border);font-size:13px;font-weight:500;transition:all 0.2s;cursor:pointer}
.filter-tab:hover{border-color:var(--accent);color:var(--text)}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ═══════════ RESPONSIVE ═══════════ */
@media(max-width:768px){
  .nav{display:none;position:absolute;top:64px;left:0;right:0;flex-direction:column;background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px}
  .nav.open{display:flex}
  .mobile-toggle{display:flex}
  .header-inner{flex-wrap:wrap}
  .user-info span:not(.user-avatar){display:none}
  .grid-2{grid-template-columns:1fr}
  .spec-grid{grid-template-columns:1fr}
  .hero-actions{flex-direction:column;align-items:stretch}
}

/* ═══════════ CHALLENGE MODE ═══════════ */
.challenge-item{padding:14px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px;font-weight:500}
.challenge-item:hover{border-color:var(--accent);background:var(--bg-card2)}
.challenge-done{border-color:var(--green);background:rgba(52,211,153,0.05)}

/* ═══════════ COMPONENT IMAGE ═══════════ */
.comp-img-wrap{width:100%;height:175px;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px;background:var(--bg-surface);position:relative}
.comp-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.card:hover .comp-img-wrap img{transform:scale(1.05)}

/* ═══════════ FOOTER ═══════════ */
.footer{text-align:center;padding:28px;border-top:1px solid var(--border);color:var(--text3);font-size:13px;margin-top:60px}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════

// ║                                                              ║
// ║  IMPORTANTE: No borres las comillas "" que rodean la URL    ║
// ╚══════════════════════════════════════════════════════════════╝
//

const DB = {
  components: [
    // ══════════ PROCESADORES (CPU) ══════════

      tip:"Los pines están en el procesador. Levanta la palanca del socket, alinea el triángulo y deja caer suavemente.",

    { id:3, name:"Intel Core i7-13700K", category:"cpu", socket:"LGA 1700",
      desc:"Procesador de 16 núcleos (8P+8E) y 24 hilos. Hasta 5.4 GHz en turbo. Excelente para gaming de alta gama y creación de contenido.",

const $=id=>document.getElementById(id);
const app=$('app');

function h(tag,attrs,...children){
  let html = '<'+tag;
  if(attrs) for(let k in attrs){
    if(k==='onclick'||k==='onchange'||k==='oninput'||k==='onkeydown') continue;
    if(attrs[k]===false||attrs[k]===null||attrs[k]===undefined) continue;
    html+=' '+k+'="'+(attrs[k]+'').replace(/"/g,'&quot;')+'"';
  }
  html+='>';
  const voids=['img','input','br','hr','meta','link'];
  if(!voids.includes(tag)){
    for(let c of children){
      if(Array.isArray(c)) html+=c.join('');
      else if(c!==null&&c!==undefined&&c!==false) html+=c;
    }
    html+='</'+tag+'>';
  }
  return html;
}

function stars(v) {
  let s='';
  for(let i=1;i<=5;i++) s+='<span style="color:'+(i<=Math.round(v)?'var(--amber)':'var(--text3)')+'">&#9733;</span>';
  return s+' <span style="font-size:13px;color:var(--text2);margin-left:4px">'+v+'</span>';
}

    ${s.challengeOrder.length>0?`

    <div class="grid-3">
      ${s.challengeItems.map(item=>`
        <div class="challenge-item" onclick="challengeSelect(${item.step})">
          <img src="${item.img}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'" loading="lazy">

function renderQuiz(){
  const s=state;
  const qs=DB.quiz;
  if(s.quizFinished){
    const correct=s.quizAnswers.filter(a=>a.sel===a.correct).length;
    const pct=Math.round((correct/qs.length)*100);
    return `
    <section class="container anim-fade" style="padding-top:32px">
      <div class="text-center" style="padding:40px 0">
        <span style="font-size:80px">${pct>=70?'':pct>=50?'👍':'📚'}</span>
        <h2 style="font-size:28px;font-weight:800;margin:16px 0 8px">${pct>=70?'¡Excelente!':pct>=50?'¡Buen trabajo!':'¡Sigue practicando!'}</h2>
        <p style="font-size:18px;color:var(--text2)">${correct} de ${qs.length} respuestas correctas</p>
        <div style="max-width:300px;margin:16px auto"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}"></div></div></div>
        <p style="font-size:48px;font-weight:800;color:var(--accent);margin:8px 0 24px">${pct}%</p>
        <button class="btn btn-primary" onclick="restartQuiz()">Intentar de nuevo</button>
      </div>
    </section>`;
  }
  const q=qs[s.quizQ];
  return `
  <section class="container anim-fade" style="padding-top:32px">
    <div class="flex-between section-header">
      <h2 class="section-title"> Desafíos de conocimiento</h2>
      <span class="badge badge-purple">Pregunta ${s.quizQ+1} / ${qs.length}</span>
    </div>
    <div class="progress-bar mb-24"><div class="progress-fill" style="width:${(s.quizQ/qs.length)*100}%"></div></div>
    <div class="card" style="max-width:700px">
      <h3 style="font-size:18px;font-weight:600;line-height:1.5;margin-bottom:20px">${q.q}</h3>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${q.opts.map((opt,i)=>{
          let cls='quiz-option';
          if(s.quizSelected!==null){
            cls+=' disabled';
            if(i===q.correct) cls+=' correct';
            else if(i===s.quizSelected && i!==q.correct) cls+=' wrong';
          }
          return `<div class="${cls}" onclick="answerQuiz(${i})">
            <div class="quiz-letter">${s.quizSelected!==null&&i===q.correct?'Si':s.quizSelected===i&&i!==q.correct?'X':'ABCD'[i]}</div>
            <span>${opt}</span>
          </div>`;
        }).join('')}
      </div>
      ${s.quizShowExplain?`
        <div class="compat-box compat-info mt-16">
          <div style="font-weight:600;color:var(--cyan);margin-bottom:4px"> Explicación</div>
          <div style="font-size:14px;color:var(--text2);line-height:1.5">${q.explain}</div>
        </div>
        <button class="btn btn-primary mt-16" onclick="nextQuiz()">${s.quizQ<qs.length-1?'Siguiente pregunta →':'Ver resultados'}</button>
      `:''}
    </div>
  </section>`;
}

function renderComparator(){
  const s=state;
  const cats=DB.categories;
  const catKeys=Object.keys(cats);
  const byCat=state.components.filter(c=>c.category===s.cmpCat);
  const compA=byCat.find(c=>c.id==s.cmpA);
  const compB=byCat.find(c=>c.id==s.cmpB);

  let tableHTML='';
  if(compA && compB){
    const allKeys=[...new Set([...Object.keys(compA.specs||{}), ...Object.keys(compB.specs||{})])];
    tableHTML=`
    <div class="card mt-24 anim-fade">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:16px">Resultado de la comparacion</h3>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:14px">
          <thead>
            <tr style="border-bottom:2px solid var(--border2)">
              <th style="text-align:left;padding:10px;color:var(--text3);font-size:12px;text-transform:uppercase;width:30%">Especificacion</th>
              <th style="text-align:center;padding:10px;font-weight:700;width:35%">${compA.name}</th>
              <th style="text-align:center;padding:10px;font-weight:700;width:35%">${compB.name}</th>
            </tr>
          </thead>
          <tbody>
            ${allKeys.map(k=>{
              const vA=(compA.specs||{})[k]||'—';
              const vB=(compB.specs||{})[k]||'—';
              const diff=vA!==vB;
              return `<tr style="border-bottom:1px solid var(--border)">
                <td style="padding:10px;color:var(--text2);font-weight:500">${k}</td>
                <td style="padding:10px;text-align:center;${diff?'font-weight:700;color:var(--accent)':''}">${vA}</td>
                <td style="padding:10px;text-align:center;${diff?'font-weight:700;color:var(--accent)':''}">${vB}</td>
              </tr>`;
            }).join('')}
            <tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px;color:var(--text2);font-weight:500">Compatibilidad</td>
              <td style="padding:10px;font-size:12px;color:var(--text2)">${compA.compat}</td>
              <td style="padding:10px;font-size:12px;color:var(--text2)">${compB.compat}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
  }

  return `
  <section class="container anim-fade" style="padding-top:32px">
    <div class="section-header">
      <h2 class="section-title">Comparador de componentes</h2>
      <p class="section-subtitle">Selecciona dos componentes de la misma categoria para comparar sus especificaciones lado a lado.</p>
    </div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select" onchange="setState({cmpCat:this.value,cmpA:'',cmpB:''})">
          ${catKeys.map(k=>`<option value="${k}" ${s.cmpCat===k?'selected':''}>${cats[k].name}</option>`).join('')}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end">
        <div class="form-group" style="margin:0">
          <label class="form-label">Componente A</label>
          <select class="form-select" onchange="setState({cmpA:this.value})">
            <option value="">-- Seleccionar --</option>
            ${byCat.map(c=>`<option value="${c.id}" ${s.cmpA==c.id?'selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div style="padding-bottom:8px;font-weight:700;color:var(--text3);font-size:18px">vs</div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Componente B</label>
          <select class="form-select" onchange="setState({cmpB:this.value})">
            <option value="">-- Seleccionar --</option>
            ${byCat.filter(c=>c.id!=s.cmpA).map(c=>`<option value="${c.id}" ${s.cmpB==c.id?'selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    ${tableHTML}
  </section>`;
}

function renderBudget(){
  const s=state;
  const cats=DB.categories;
  const catOrder=['cpu','motherboard','ram','storage','gpu','psu','case'];
  const prices={
    1:175,2:200,3:410,4:330,
    10:130,11:115,12:140,13:210,
    20:55,21:70,22:95,23:180,
    30:110,31:95,32:55,33:35,
    40:330,41:380,42:550,43:150,
    50:60,51:110,52:140,53:45,
    60:105,61:90,62:55,63:115
  };
  const byCat=cat=>state.components.filter(c=>c.category===cat);

  let totalPrice=0;
  let selectedItems=[];
  catOrder.forEach(cat=>{
    const id=s.budgetSel[cat];
    if(id){
      const comp=state.components.find(c=>c.id==id);
      if(comp){
        const price=prices[comp.id]||100;
        totalPrice+=price;
        selectedItems.push({name:comp.name,cat:cats[cat].name,price});
      }
    }
  });

  return `
  <section class="container anim-fade" style="padding-top:32px">
    <div class="section-header">
      <h2 class="section-title">Calculadora de presupuesto</h2>
      <p class="section-subtitle">Selecciona los componentes de tu build para obtener una estimacion del costo total de inversion.</p>
    </div>
    <div class="grid-2">
      <div class="card">
        <h4 style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px">Selecciona tus componentes</h4>
        ${catOrder.map(cat=>`
          <div class="form-group">
            <label class="form-label">${cats[cat].icon} ${cats[cat].name}</label>
            <select class="form-select" onchange="state.budgetSel.${cat}=this.value;render()">
              <option value="">-- Sin seleccionar --</option>
              ${byCat(cat).map(c=>`<option value="${c.id}" ${s.budgetSel[cat]==c.id?'selected':''}>${c.name} — $${prices[c.id]||100} USD</option>`).join('')}
            </select>
          </div>
        `).join('')}
      </div>
      <div>
        <div class="card" style="position:sticky;top:80px">
          <h4 style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px">Resumen de presupuesto</h4>
          ${selectedItems.length>0?`
            ${selectedItems.map(item=>`
              <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
                <div>
                  <div style="font-size:14px;font-weight:500">${item.name}</div>
                  <div style="font-size:12px;color:var(--text3)">${item.cat}</div>
                </div>
                <div style="font-weight:700;font-size:15px;color:var(--accent)">$${item.price}</div>
              </div>
            `).join('')}
            <div style="display:flex;justify-content:space-between;padding:16px 0 0;margin-top:8px">
              <div style="font-size:16px;font-weight:700">Total estimado</div>
              <div style="font-size:24px;font-weight:800;color:var(--accent)">$${totalPrice} USD</div>
            </div>
            <p style="font-size:11px;color:var(--text3);margin-top:8px">* Precios referenciales. Pueden variar segun el vendedor y la disponibilidad.</p>
          `:`
            <div style="text-align:center;padding:32px 0;color:var(--text3)">
              <p style="font-size:14px">Selecciona componentes para ver el presupuesto estimado.</p>
            </div>
          `}
        </div>
      </div>
    </div>
  </section>`;
}

// MAIN RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  if(!state.user){
    app.innerHTML = renderLogin();
    return;
  }
  let content='';
  switch(state.section){
    case 'home': content=renderHero(); break;
    case 'components': content=renderComponents(); break;
    case 'compatibility': content=renderCompatibility(); break;
    case 'comparator': content=renderComparator(); break;
    case 'budget': content=renderBudget(); break;
    case 'simulator': content=renderSimulator(); break;
    case 'quiz': content=renderQuiz(); break;
    case 'stores': content=renderStores(); break;
  }
  const comp = state.selectedComp ? state.components.find(c=>c.id===state.selectedComp) : null;
  app.innerHTML = renderHeader() + content +
    `<footer class="footer">PC Builder Pro — Plataforma educativa interactiva de ensamblaje de computadoras<br><span style="font-size:11px;color:var(--text3)">Proyecto desarrollado como solución al problema de falta de conocimiento en ensamblaje de PCs</span></footer>` +
    (comp ? renderCompDetail(comp) : '') + renderAdminModals();
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function navigate(s){ setState({section:s, mobileNav:false}); window.scrollTo(0,0); }
function doLogin(){
  const user = state.loginUser || '';
  const pass = state.loginPass || '';
  if(state.loginMode==='admin'){
    if(user==='admin'&&pass==='admin123') setState({user:'Administrador',role:'admin',section:'home'});
    else setState({loginError:'Credenciales incorrectas. Usa admin / admin123'});
  } else {
    if(user.trim()) setState({user:user.trim(),role:'user',section:'home'});
    else setState({loginError:'Por favor ingresa tu nombre.'});
  }
}
function doLogout(){ setState({user:null,role:null,section:'home',loginUser:'',loginPass:'',loginError:'',loginMode:'user'}); }

function openComp(id){ setState({selectedComp:id}); }

function checkCompat(){
  const s=state.sel;
  const comps=state.components;
  const cpu=comps.find(c=>c.id==s.cpu);
  const mobo=comps.find(c=>c.id==s.motherboard);
  const ram=comps.find(c=>c.id==s.ram);
  const gpu=comps.find(c=>c.id==s.gpu);
  const psu=comps.find(c=>c.id==s.psu);
  const errors=[],warnings=[],passes=[];

  if(cpu&&mobo){
    if(cpu.socket!==mobo.socket) errors.push({title:'Socket incompatible',detail:`El ${cpu.name} usa socket ${cpu.socket} pero la ${mobo.name} tiene socket ${mobo.socket}. Estos NO funcionan juntos. Necesitas cambiar el CPU o la placa base.`});
    else passes.push({title:'Socket compatible',detail:`Ambos usan socket ${cpu.socket}. El procesador encajará correctamente en la placa base.`});
  }
  if(ram&&mobo){
    if(ram.ramType!==mobo.ramType) errors.push({title:'Tipo de RAM incompatible',detail:`La ${ram.name} es ${ram.ramType} pero la ${mobo.name} solo soporta ${mobo.ramType}. La memoria NO encajará físicamente en el slot porque la muesca está en posición diferente.`});
    else passes.push({title:'RAM compatible',detail:`Ambos soportan ${ram.ramType}. La memoria encajará correctamente en los slots de la placa.`});
  }
  if(gpu&&psu){
    const gpuW=gpu.tdp||170; const total=gpuW+150; const psuW=psu.wattage||600;
    if(psuW<total+50) warnings.push({title:'Fuente justa en potencia',detail:`Consumo estimado del sistema: ~${total}W. Tu fuente de ${psuW}W funciona pero con poco margen. Se recomienda ${total+150}W+ para mayor estabilidad y futuras mejoras.`});
    else passes.push({title:'Potencia suficiente',detail:`La fuente de ${psuW}W cubre el consumo estimado de ${total}W con buen margen de seguridad.`});
  }
  if(!s.cpu||!s.motherboard||!s.ram) warnings.push({title:'Selección incompleta',detail:'Selecciona al menos CPU, placa base y RAM para una verificación completa de compatibilidad.'});

  // Calcular datos de potencia
  let powerData = null;
  const cpuTdp = cpu ? (parseInt(cpu.specs?.TDP)||65) : 0;
  const gpuTdp = gpu ? (gpu.tdp||170) : 0;
  const ramW = ram ? 10 : 0;
  const otherW = 50; // storage, fans, etc
  const totalW = cpuTdp + gpuTdp + ramW + otherW;
  const psuW = psu ? (psu.wattage||600) : totalW + 200;
  if(cpu || gpu){
    powerData = {
      total: totalW, psu: psuW,
      items: [
        {label:'CPU', watts:cpuTdp},
        {label:'GPU', watts:gpuTdp},
        {label:'RAM', watts:ramW},
        {label:'Otros', watts:otherW}
      ]
    };
  }

  setState({compatResults:{errors,warnings,passes,powerData}});
}

function completeStep(i){
  const done=[...state.simCompleted];
  if(!done.includes(i)) done.push(i);
  setState({simCompleted:done, simStep:Math.min(i+1,DB.assemblySteps.length-1)});
}
function startChallenge(){
  const shuffled=[...DB.assemblySteps].sort(()=>Math.random()-0.5);
  setState({challengeMode:true,challengeItems:shuffled,challengeOrder:[],challengeFeedback:null,challengeScore:0});
}
function challengeSelect(step){
  const next=state.challengeOrder.length+1;
  const item=DB.assemblySteps.find(s=>s.step===step);
  if(step===next){
    const newOrder=[...state.challengeOrder, item];
    const newItems=state.challengeItems.filter(i=>i.step!==step);
    setState({challengeOrder:newOrder, challengeItems:newItems, challengeScore:state.challengeScore+10,
      challengeFeedback:{type:'success',msg:`¡Correcto! "${item.title}" es el paso #${next}.`}});
  } else {
    const correctItem=DB.assemblySteps[next-1];
    setState({challengeFeedback:{type:'error',msg:`Incorrecto. "${item.title}" no es el paso #${next}. Pista: el siguiente paso es sobre "${correctItem.title.toLowerCase()}".`}});
  }
  setTimeout(()=>{ if(state.challengeFeedback) setState({challengeFeedback:null}); },4000);
}

function answerQuiz(i){
  if(state.quizSelected!==null) return;
  const q=DB.quiz[state.quizQ];
  setState({quizSelected:i, quizShowExplain:true, quizAnswers:[...state.quizAnswers,{sel:i,correct:q.correct}]});
}
function nextQuiz(){
  if(state.quizQ<DB.quiz.length-1) setState({quizQ:state.quizQ+1,quizSelected:null,quizShowExplain:false});
  else setState({quizFinished:true});
}
function restartQuiz(){ setState({quizQ:0,quizSelected:null,quizShowExplain:false,quizAnswers:[],quizFinished:false}); }

// Admin actions
function openAddComp(){ setState({showAddComp:true,editComp:null}); }
function openEditComp(id){ const c=state.components.find(x=>x.id===id); if(c) setState({editComp:{...c},showAddComp:false}); }
function closeAdminModal(){ setState({showAddComp:false,editComp:null}); }
function deleteComp(id){ if(confirm('¿Eliminar este componente?')) setState({components:state.components.filter(c=>c.id!==id)}); }
function deleteStore(id){ if(confirm('¿Eliminar esta tienda?')) setState({stores:state.stores.filter(s=>s.id!==id)}); }

function saveComp(editId){
  const name=$('f-name')?.value?.trim();
  const cat=$('f-cat')?.value;
  const desc=$('f-desc')?.value?.trim();
  const compat=$('f-compat')?.value?.trim();
  if(!name||!desc||!compat){ alert('Completa los campos obligatorios (nombre, descripción, compatibilidad)'); return; }
  const comp={
    id:editId||Date.now(), name, category:cat,
    socket:$('f-socket')?.value?.trim()||'',
    ramType:$('f-ramtype')?.value?.trim()||'',
    wattage:parseInt($('f-watt')?.value)||0,
    tdp:parseInt($('f-watt')?.value)||0,
    desc, compat,
    tip:$('f-tip')?.value?.trim()||'',
    img:$('f-img')?.value?.trim()||'https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?w=400&h=300&fit=crop',
    video:$('f-video')?.value?.trim()||'uUGI3Grx4qU',
    specs:{}, order:Object.keys(DB.categories).indexOf(cat)+1
  };
  if(editId) setState({components:state.components.map(c=>c.id===editId?comp:c),editComp:null,showAddComp:false});
  else setState({components:[...state.components,comp],showAddComp:false});
}
function saveStore(){
  const name=$('fs-name')?.value?.trim();
  const loc=$('fs-loc')?.value?.trim();
  const url=$('fs-url')?.value?.trim();
  if(!name||!loc||!url){ alert('Completa todos los campos'); return; }
  setState({stores:[...state.stores,{id:Date.now(),name,location:loc,url,rating:4.0,verified:true}],showAddStore:false});
}

// Initial state
state.loginMode='user';state.loginUser='';state.loginPass='';state.loginError='';
render();
</script>
